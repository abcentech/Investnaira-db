<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    InvestNaira — Unified Platform
    ══════════════════════════════════════════════════════
    Architecture: Vanilla JS hash-router · two files total
    Brands:
      Hub        #/           — portal, choose your path
      Wealth     #/wealth     — invest, grow, build wealth
      Research   #/research   — market intelligence, reports

    Design system shared across all three brands:
      Base: Lagos dark green DNA (#061A0E)
      Wealth accent:   #C9A04A gold → warm, hopeful, growth
      Research accent: #008751 green → precise, editorial
      Hub: both — dramatic split
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="InvestNaira — Invest in Nigeria. Build wealth for the long term. Access independent market research." />
  <meta name="theme-color" content="#061A0E" />
  <title>InvestNaira</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@300;400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet" />

  <style>
    @layer reset, tokens, base, layout, header, ticker, components, hub, wealth, research, pages, utilities, animations;

    /* ── TOKENS ─────────────────────────────────────────── */
    @layer tokens {
      :root {
        /* Shared palette */
        --c-bg:      #061A0E;
        --c-surface: #0D2B18;
        --c-raised:  #122F1C;
        --c-border:  rgba(234,230,220,.08);
        --c-bd-mid:  rgba(234,230,220,.14);
        --c-text:    #EAE6DC;
        --c-muted:   rgba(234,230,220,.42);

        /* Research accent — precision green */
        --c-research: #008751;
        --c-res-g:    rgba(0,135,81,.18);

        /* Wealth accent — gold / growth */
        --c-wealth:   #C9A04A;
        --c-wlth-g:   rgba(201,160,74,.18);
        --c-wlth-dim: rgba(201,160,74,.12);

        /* Semantic — switches per brand via JS data-brand attr */
        --c-accent:   #008751;
        --c-accent-g: rgba(0,135,81,.18);

        --c-pos: #3DBA7A;
        --c-neg: #E05252;

        --font-display: 'Playfair Display', Georgia, serif;
        --font-mono:    'DM Mono', 'Courier New', monospace;
        --font-body:    'Source Serif 4', Georgia, serif;

        /* Type scale — 1.333 perfect fourth */
        --s--1: clamp(.75rem,  .7rem  + .24vw, .875rem);
        --s-0:  clamp(1rem,    .93rem + .32vw, 1.125rem);
        --s-1:  clamp(1.33rem, 1.24rem + .43vw, 1.5rem);
        --s-2:  clamp(1.78rem, 1.65rem + .57vw, 2rem);
        --s-3:  clamp(2.37rem, 2.2rem  + .76vw, 2.67rem);
        --s-4:  clamp(3.16rem, 2.94rem + 1.02vw, 3.56rem);
        --s-5:  clamp(4.21rem, 3.92rem + 1.36vw, 4.74rem);
        --s-6:  clamp(5.61rem, 5.22rem + 1.8vw,  6.33rem);

        /* Spacing */
        --sp-2xs: clamp(.25rem,.22rem + .12vw,.375rem);
        --sp-xs:  clamp(.5rem, .46rem + .19vw,.625rem);
        --sp-s:   clamp(.75rem,.7rem  + .24vw,1rem);
        --sp-m:   clamp(1rem,  .93rem + .32vw,1.375rem);
        --sp-l:   clamp(1.5rem,1.39rem + .49vw,2rem);
        --sp-xl:  clamp(2rem,  1.86rem + .65vw,2.75rem);
        --sp-2xl: clamp(3rem,  2.79rem + .97vw,4rem);
        --sp-3xl: clamp(4.5rem,4.18rem + 1.46vw,6rem);
        --sp-4xl: clamp(6rem,  5.57rem + 1.94vw,8rem);

        --ease-expo:   cubic-bezier(.16,1,.3,1);
        --ease-spring: cubic-bezier(.34,1.56,.64,1);
      }

      /* Wealth brand — gold accent */
      [data-brand="wealth"] {
        --c-accent:   var(--c-wealth);
        --c-accent-g: var(--c-wlth-g);
      }

      /* Research brand — green accent */
      [data-brand="research"] {
        --c-accent:   var(--c-research);
        --c-accent-g: var(--c-res-g);
      }
    }

    /* ── RESET ──────────────────────────────────────────── */
    @layer reset {
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
      html{scroll-behavior:smooth;}
      ul{list-style:none;}
      img{max-width:100%;display:block;}
      button{font:inherit;border:none;background:none;cursor:pointer;}
      a{color:inherit;text-decoration:none;cursor:none;}
    }

    /* ── BASE ───────────────────────────────────────────── */
    @layer base {
      html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
      body{
        background:var(--c-bg);color:var(--c-text);
        font-family:var(--font-body);font-size:var(--s-0);font-weight:300;
        line-height:1.7;overflow-x:hidden;cursor:none;
      }
      /* Grid texture */
      body::before{
        content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
        background-image:
          linear-gradient(rgba(0,135,81,.025) 1px,transparent 1px),
          linear-gradient(90deg,rgba(0,135,81,.025) 1px,transparent 1px);
        background-size:48px 48px;
        mask-image:radial-gradient(ellipse 80% 80% at 50% 0%,black 40%,transparent 100%);
      }
      /* Grain */
      body::after{
        content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.03;
        background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size:160px;
      }
      :focus-visible{outline:1.5px solid var(--c-accent);outline-offset:4px;border-radius:2px;}
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    @layer layout {
      .container{max-width:1300px;margin-inline:auto;padding-inline:var(--sp-l);position:relative;z-index:1;}
      .sp {padding-block:var(--sp-3xl);}
      .sp-l{padding-block:var(--sp-4xl);}
    }

    /* ── HEADER ─────────────────────────────────────────── */
    @layer header {
      .cursor     {position:fixed;width:6px;height:6px;background:var(--c-accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);will-change:transform;transition:width .25s var(--ease-expo),height .25s var(--ease-expo),background .2s;}
      .cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(0,135,81,.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);will-change:transform;transition:width .4s var(--ease-expo),height .4s var(--ease-expo),border-color .3s;}
      body.cur-on .cursor      {width:3px;height:3px;}
      body.cur-on .cursor-ring {width:52px;height:52px;}
      [data-brand="wealth"] .cursor      {background:var(--c-wealth);}
      [data-brand="wealth"] .cursor-ring {border-color:rgba(201,160,74,.4);}
      [data-brand="wealth"].cur-on .cursor-ring{border-color:rgba(201,160,74,.6);}

      .site-header{
        position:fixed;inset-block-start:0;inset-inline:0;z-index:100;
        padding:var(--sp-m) var(--sp-l);
        display:flex;align-items:center;justify-content:space-between;
        border-block-end:1px solid transparent;
        transition:border-color .4s,background-color .4s,backdrop-filter .4s;
      }
      .site-header.on{
        border-color:var(--c-border);
        background:rgba(6,26,14,.9);
        backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      }
      .site-header.hidden{transform:translateY(-100%);transition:transform .4s var(--ease-expo);}

      .logo{display:flex;align-items:center;gap:var(--sp-s);font-family:var(--font-display);font-size:var(--s-1);font-weight:600;letter-spacing:-.02em;cursor:none;}
      .logo-flag{display:flex;gap:2px;width:18px;height:20px;}
      .logo-flag span{flex:1;border-radius:1px;}
      .logo-flag span:nth-child(1),.logo-flag span:nth-child(3){background:var(--c-research);}
      .logo-flag span:nth-child(2){background:var(--c-text);opacity:.9;}
      .logo-sub{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.08em;text-transform:uppercase;color:var(--c-accent);margin-inline-start:2px;}

      .main-nav ul{display:flex;gap:var(--sp-l);}
      .main-nav a{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.07em;text-transform:uppercase;color:var(--c-muted);transition:color .25s;}
      .main-nav a:hover,.main-nav a.active{color:var(--c-text);}
      .main-nav a.active{border-block-end:1px solid var(--c-accent);padding-block-end:2px;}

      .nav-cta{font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;letter-spacing:.07em;text-transform:uppercase;color:var(--c-bg);background:var(--c-accent);padding:var(--sp-xs) var(--sp-m);border-radius:2px;cursor:none;transition:background .25s;}
      .nav-cta:hover{background:color-mix(in srgb,var(--c-accent) 80%,white);}

      /* Brand switcher pill */
      .brand-switch{
        display:flex;align-items:center;gap:0;
        border:1px solid var(--c-bd-mid);border-radius:2px;overflow:hidden;
        font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.06em;text-transform:uppercase;
      }
      .brand-switch a{
        padding:var(--sp-2xs) var(--sp-s);color:var(--c-muted);transition:background .2s,color .2s;cursor:none;
      }
      .brand-switch a.active{color:var(--c-bg);background:var(--c-accent);}
      .brand-switch a:not(.active):hover{color:var(--c-text);}

      .hamburger{display:none;flex-direction:column;gap:5px;padding:4px;cursor:none;}
      .hamburger span{display:block;width:22px;height:1.5px;background:var(--c-text);transition:transform .3s,opacity .3s;}
      .mobile-nav{position:fixed;inset:0;background:var(--c-bg);z-index:99;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-xl);opacity:0;pointer-events:none;transition:opacity .35s;}
      .mobile-nav.open{opacity:1;pointer-events:all;}
      .mobile-nav a{font-family:var(--font-display);font-size:var(--s-3);font-weight:400;font-style:italic;color:var(--c-muted);transition:color .25s;cursor:none;}
      .mobile-nav a:hover{color:var(--c-text);}
    }

    /* ── TICKER ─────────────────────────────────────────── */
    @layer ticker {
      .ticker-bar{background:var(--c-surface);border-block-end:1px solid var(--c-border);padding-block:var(--sp-2xs);overflow:hidden;position:relative;z-index:10;margin-block-start:64px;}
      .ticker-track{display:flex;width:max-content;gap:var(--sp-2xl);align-items:center;}
      .ticker-item{display:flex;align-items:center;gap:var(--sp-xs);white-space:nowrap;font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;}
      .tk-sym{color:var(--c-text);letter-spacing:.06em;}
      .tk-prc{color:var(--c-muted);}
      .tk-chg{font-size:.72em;letter-spacing:.04em;}
      .tk-chg.up{color:var(--c-pos);}
      .tk-chg.down{color:var(--c-neg);}
      .tk-div{width:1px;height:14px;background:var(--c-bd-mid);flex-shrink:0;}
    }

    /* ── SHARED COMPONENTS ──────────────────────────────── */
    @layer components {
      .sec-head{display:flex;align-items:baseline;justify-content:space-between;border-block-end:1px solid var(--c-border);padding-block-end:var(--sp-m);margin-block-end:var(--sp-2xl);}
      .sec-eye{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.1em;text-transform:uppercase;color:var(--c-accent);margin-block-end:var(--sp-xs);}
      .sec-ttl{font-family:var(--font-display);font-size:var(--s-4);font-weight:600;letter-spacing:-.04em;font-style:italic;}
      .sec-lnk{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.07em;text-transform:uppercase;color:var(--c-muted);border-block-end:1px solid currentColor;padding-block-end:2px;transition:color .25s;white-space:nowrap;cursor:none;}
      .sec-lnk:hover{color:var(--c-text);}

      .page-hero{padding-block:var(--sp-4xl) var(--sp-2xl);border-block-end:1px solid var(--c-border);margin-block-end:var(--sp-2xl);}
      .page-eye{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.1em;text-transform:uppercase;color:var(--c-accent);margin-block-end:var(--sp-m);}
      .page-h1{font-family:var(--font-display);font-size:var(--s-5);font-weight:600;letter-spacing:-.05em;line-height:.95;font-style:italic;}
      .page-sub{font-size:var(--s-1);font-weight:300;font-style:italic;color:var(--c-muted);max-width:48ch;line-height:1.5;margin-block-start:var(--sp-l);}

      .btn-primary{
        display:inline-flex;align-items:center;gap:var(--sp-m);
        font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;letter-spacing:.1em;text-transform:uppercase;
        background:var(--c-accent);color:var(--c-bg);
        padding:var(--sp-m) var(--sp-2xl);border-radius:2px;
        position:relative;overflow:hidden;cursor:none;transition:color .3s;
      }
      .btn-primary::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15);transform:translateX(-101%);transition:transform .45s var(--ease-expo);}
      .btn-primary:hover::before{transform:translateX(0);}
      .btn-primary>*{position:relative;z-index:1;}
      .btn-primary .arr{display:inline-block;transition:transform .3s var(--ease-expo);}
      .btn-primary:hover .arr{transform:translateX(6px);}

      .btn-ghost{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.08em;text-transform:uppercase;color:var(--c-muted);border-block-end:1px solid currentColor;padding-block-end:2px;cursor:none;transition:color .25s;}
      .btn-ghost:hover{color:var(--c-text);}

      .type-badge{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.07em;text-transform:uppercase;padding:var(--sp-2xs) var(--sp-xs);border-radius:2px;white-space:nowrap;}
      .type-badge.equity    {color:#3DBA7A;border:1px solid rgba(61,186,122,.3);background:rgba(61,186,122,.06);}
      .type-badge.commodity {color:#C9A04A;border:1px solid rgba(201,160,74,.3);background:rgba(201,160,74,.06);}
      .type-badge.currency  {color:#008751;border:1px solid rgba(0,135,81,.4);background:rgba(0,135,81,.06);}
      .type-badge.realestate{color:#E8A87C;border:1px solid rgba(232,168,124,.3);background:rgba(232,168,124,.06);}
      .type-badge.crypto    {color:#A78BFA;border:1px solid rgba(167,139,250,.3);background:rgba(167,139,250,.06);}

      .report-row{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:var(--sp-xl);padding-block:var(--sp-l);padding-inline:var(--sp-s);border-block-end:1px solid var(--c-border);transition:background .25s;cursor:none;position:relative;overflow:hidden;}
      .report-row:first-child{border-block-start:1px solid var(--c-border);}
      .report-row:hover{background:var(--c-surface);}
      .report-row::after{content:'';position:absolute;inset-block-end:0;inset-inline-start:0;height:1px;width:0;background:var(--c-accent);transition:width .45s var(--ease-expo);}
      .report-row:hover::after{width:100%;}
      .report-title{font-family:var(--font-display);font-size:var(--s-1);font-weight:400;letter-spacing:-.01em;}
      .report-date{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;color:var(--c-muted);white-space:nowrap;}
      .report-cta{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.07em;text-transform:uppercase;color:var(--c-research);border-block-end:1px solid currentColor;padding-block-end:2px;transition:color .25s;cursor:none;}

      .stat-box{padding:var(--sp-xl) var(--sp-l);border-inline-end:1px solid var(--c-border);position:relative;overflow:hidden;transition:background .3s;}
      .stat-box:last-child{border-inline-end:none;}
      .stat-box:hover{background:var(--c-raised);}
      .stat-box::after{content:'';position:absolute;bottom:0;left:0;height:2px;width:0;background:linear-gradient(90deg,var(--c-research),var(--c-wealth));transition:width .55s var(--ease-expo);}
      .stat-box:hover::after{width:100%;}
      .stat-num{font-family:var(--font-display);font-size:var(--s-4);font-weight:600;letter-spacing:-.04em;line-height:1;margin-block-end:var(--sp-xs);}
      .stat-lbl{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.07em;text-transform:uppercase;color:var(--c-muted);}

      .plan-card{background:var(--c-surface);border:1px solid var(--c-border);padding:var(--sp-xl);display:flex;flex-direction:column;gap:var(--sp-l);position:relative;overflow:hidden;transition:border-color .3s,background .3s;}
      .plan-card.featured{border-color:var(--c-research);background:var(--c-raised);}
      .plan-card.featured::before{content:'Most Popular';position:absolute;top:0;right:var(--sp-xl);font-family:var(--font-mono);font-size:.68rem;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--c-bg);background:var(--c-research);padding:4px 10px;}
      .plan-name{font-family:var(--font-display);font-size:var(--s-2);font-weight:600;letter-spacing:-.02em;}
      .plan-price{font-family:var(--font-display);font-size:var(--s-4);font-weight:700;letter-spacing:-.04em;line-height:1;}
      .plan-price sup{font-size:.5em;vertical-align:super;font-weight:400;}
      .plan-period{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;color:var(--c-muted);margin-block-start:var(--sp-xs);}
      .plan-save{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;color:var(--c-pos);}
      .plan-divider{height:1px;background:var(--c-border);}
      .plan-features{display:flex;flex-direction:column;gap:var(--sp-s);flex:1;}
      .plan-feat{display:flex;align-items:flex-start;gap:var(--sp-s);font-size:var(--s-0);font-weight:300;line-height:1.5;}
      .feat-icon{color:var(--c-research);font-size:.9em;flex-shrink:0;margin-block-start:.15em;}
      .plan-cta{width:100%;text-align:center;padding:var(--sp-m);font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;letter-spacing:.08em;text-transform:uppercase;border-radius:2px;cursor:none;transition:background .25s,color .25s;}
      .plan-cta.primary{background:var(--c-research);color:var(--c-bg);}
      .plan-cta.primary:hover{background:color-mix(in srgb,var(--c-research) 80%,white);}
      .plan-cta.outline{border:1px solid var(--c-bd-mid);color:var(--c-text);}
      .plan-cta.outline:hover{border-color:var(--c-research);color:var(--c-research);}

      .faq-item{border-block-end:1px solid var(--c-border);}
      .faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;gap:var(--sp-l);padding-block:var(--sp-l);font-family:var(--font-display);font-size:var(--s-1);font-weight:400;text-align:left;color:var(--c-text);cursor:none;transition:color .25s;}
      .faq-q:hover{color:var(--c-accent);}
      .faq-icon{font-size:var(--s-1);color:var(--c-accent);transition:transform .35s var(--ease-expo);flex-shrink:0;line-height:1;}
      .faq-item.open .faq-icon{transform:rotate(45deg);}
      .faq-a{max-height:0;overflow:hidden;transition:max-height .45s var(--ease-expo),padding .35s;}
      .faq-item.open .faq-a{max-height:400px;padding-block-end:var(--sp-l);}
      .faq-a-inner{font-size:var(--s-0);font-weight:300;color:var(--c-muted);line-height:1.7;max-width:65ch;}

      .toggle-track{position:relative;width:52px;height:28px;background:var(--c-surface);border:1px solid var(--c-bd-mid);border-radius:14px;cursor:none;transition:background .3s;}
      .toggle-track.on{background:var(--c-research);border-color:var(--c-research);}
      .toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;background:var(--c-text);border-radius:50%;transition:transform .35s var(--ease-expo);}
      .toggle-track.on .toggle-knob{transform:translateX(24px);}

      .social-link{display:inline-flex;align-items:center;gap:var(--sp-xs);font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.07em;text-transform:uppercase;color:var(--c-muted);padding:var(--sp-xs) var(--sp-m);border:1px solid var(--c-border);border-radius:2px;transition:color .25s,border-color .25s;cursor:none;}
      .social-link:hover{color:var(--c-text);border-color:var(--c-bd-mid);}

      /* Footer */
      .site-footer{border-block-start:1px solid var(--c-border);position:relative;z-index:1;}
      .ftr-top{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;gap:var(--sp-2xl);padding-block:var(--sp-2xl);}
      .ftr-brand-name{font-family:var(--font-display);font-size:var(--s-2);font-weight:600;letter-spacing:-.02em;margin-block-end:var(--sp-m);display:flex;align-items:center;gap:var(--sp-s);}
      .ftr-desc{font-size:var(--s-0);font-weight:300;color:var(--c-muted);line-height:1.65;max-width:32ch;margin-block-end:var(--sp-l);}
      .ftr-socials{display:flex;flex-wrap:wrap;gap:var(--sp-s);}
      .ftr-col-ttl{font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;letter-spacing:.09em;text-transform:uppercase;color:var(--c-text);margin-block-end:var(--sp-l);}
      .ftr-col ul{display:flex;flex-direction:column;gap:var(--sp-s);}
      .ftr-col a{font-size:var(--s-0);font-weight:300;color:var(--c-muted);transition:color .25s;cursor:none;}
      .ftr-col a:hover{color:var(--c-text);}
      .ftr-btm{border-block-start:1px solid var(--c-border);padding-block:var(--sp-m);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--sp-m);}
      .ftr-legal{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.05em;color:var(--c-muted);}
    }

    /* ── HUB PAGE ────────────────────────────────────────── */
    @layer hub {
      .hub-page{
        min-height:100svh;display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        padding:var(--sp-2xl) var(--sp-l);
        position:relative;overflow:hidden;
      }
      /* Left glow = research green */
      .hub-page::before{
        content:'';position:absolute;left:-10%;top:20%;
        width:50vmax;height:50vmax;
        background:radial-gradient(circle,rgba(0,135,81,.1) 0%,transparent 65%);
        pointer-events:none;
      }
      /* Right glow = wealth gold */
      .hub-page::after{
        content:'';position:absolute;right:-10%;bottom:20%;
        width:50vmax;height:50vmax;
        background:radial-gradient(circle,rgba(201,160,74,.08) 0%,transparent 65%);
        pointer-events:none;
      }
      /* Ghost ₦ — structural */
      .hub-naira{
        position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
        font-family:var(--font-display);
        font-size:clamp(18rem,40vw,58rem);font-weight:700;
        color:transparent;-webkit-text-stroke:1px rgba(234,230,220,.04);
        line-height:1;pointer-events:none;user-select:none;z-index:0;
        white-space:nowrap;
      }
      .hub-inner{position:relative;z-index:1;text-align:center;width:100%;max-width:1200px;}
      .hub-logo{
        display:flex;align-items:center;justify-content:center;gap:var(--sp-s);
        font-family:var(--font-display);font-size:var(--s-3);font-weight:600;letter-spacing:-.03em;
        margin-block-end:var(--sp-s);
      }
      .hub-tagline{
        font-size:var(--s-1);font-weight:300;font-style:italic;
        color:var(--c-muted);margin-block-end:var(--sp-3xl);
      }
      .hub-cards{
        display:grid;grid-template-columns:1fr 1px 1fr;
        gap:0;align-items:stretch;
        border:1px solid var(--c-bd-mid);border-radius:4px;overflow:hidden;
      }
      .hub-divider{background:var(--c-bd-mid);}
      .hub-card{
        padding:var(--sp-2xl) var(--sp-2xl);
        display:flex;flex-direction:column;gap:var(--sp-xl);
        position:relative;overflow:hidden;cursor:none;
        transition:background .4s;
        text-align:left;
      }
      .hub-card:hover{background:var(--c-surface);}
      /* Glow on hover per card */
      .hub-card.wealth:hover::before{
        content:'';position:absolute;inset:0;
        background:radial-gradient(ellipse at 50% 100%,rgba(201,160,74,.08) 0%,transparent 70%);
        pointer-events:none;
      }
      .hub-card.research:hover::before{
        content:'';position:absolute;inset:0;
        background:radial-gradient(ellipse at 50% 100%,rgba(0,135,81,.08) 0%,transparent 70%);
        pointer-events:none;
      }
      .hub-card-tag{
        font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;
        letter-spacing:.12em;text-transform:uppercase;
        display:flex;align-items:center;gap:var(--sp-s);
      }
      .hub-card-tag.wealth  {color:var(--c-wealth);}
      .hub-card-tag.research{color:var(--c-research);}
      .hub-card-tag::before{content:'';display:block;width:28px;height:1.5px;background:currentColor;}
      .hub-card-h2{
        font-family:var(--font-display);
        font-size:clamp(2rem,4vw,3.5rem);
        font-weight:600;letter-spacing:-.04em;line-height:1;
      }
      .hub-card-desc{font-size:var(--s-1);font-weight:300;font-style:italic;color:var(--c-muted);line-height:1.5;max-width:36ch;}
      .hub-card-features{display:flex;flex-direction:column;gap:var(--sp-xs);}
      .hub-feat{
        font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;
        letter-spacing:.05em;color:var(--c-muted);
        display:flex;align-items:center;gap:var(--sp-s);
      }
      .hub-feat::before{content:'→';color:var(--c-border);font-size:.85em;}
      .hub-card-cta{
        display:inline-flex;align-items:center;gap:var(--sp-m);
        font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;
        letter-spacing:.1em;text-transform:uppercase;
        padding:var(--sp-m) var(--sp-xl);border-radius:2px;
        position:relative;overflow:hidden;cursor:none;
        transition:color .3s;width:fit-content;
        margin-block-start:auto;
      }
      .hub-card-cta::before{content:'';position:absolute;inset:0;transform:translateX(-101%);transition:transform .4s var(--ease-expo);}
      .hub-card-cta:hover::before{transform:translateX(0);}
      .hub-card-cta>*{position:relative;z-index:1;}
      .hub-card-cta.wealth{background:var(--c-wealth);color:var(--c-bg);}
      .hub-card-cta.wealth::before{background:rgba(0,0,0,.15);}
      .hub-card-cta.research{background:var(--c-research);color:var(--c-bg);}
      .hub-card-cta.research::before{background:rgba(0,0,0,.15);}
      .hub-card-arr{display:inline-block;transition:transform .3s var(--ease-expo);}
      .hub-card-cta:hover .hub-card-arr{transform:translateX(6px);}

      .hub-footer-note{
        margin-block-start:var(--sp-2xl);
        font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;
        letter-spacing:.06em;color:var(--c-muted);
        position:relative;z-index:1;
      }
    }

    /* ── WEALTH PAGES ────────────────────────────────────── */
    @layer wealth {
      /* Hero */
      .w-hero{
        min-height:100svh;display:grid;grid-template-rows:1fr auto;
        position:relative;overflow:hidden;padding-block-start:72px;
      }
      .w-hero::before{content:'';position:absolute;top:-15%;right:-10%;width:60vmax;height:60vmax;background:radial-gradient(circle,rgba(201,160,74,.07) 0%,transparent 65%);pointer-events:none;}
      .w-hero::after{content:'';position:absolute;bottom:-20%;left:-10%;width:50vmax;height:50vmax;background:radial-gradient(circle,rgba(0,135,81,.05) 0%,transparent 65%);pointer-events:none;}
      .w-naira-bg{position:absolute;right:-.05em;top:50%;transform:translateY(-50%);font-family:var(--font-display);font-size:clamp(16rem,38vw,52rem);font-weight:700;color:transparent;-webkit-text-stroke:1px rgba(201,160,74,.06);line-height:1;pointer-events:none;user-select:none;z-index:0;}

      .w-hero-inner{display:flex;flex-direction:column;justify-content:center;padding:var(--sp-4xl) var(--sp-l) var(--sp-2xl);position:relative;z-index:1;}
      .w-badge{display:inline-flex;align-items:center;gap:var(--sp-s);padding:var(--sp-xs) var(--sp-m);border:1px solid rgba(201,160,74,.25);border-radius:2px;background:rgba(201,160,74,.04);width:fit-content;margin-block-end:var(--sp-xl);}
      .w-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--c-wealth);box-shadow:0 0 8px var(--c-wealth);flex-shrink:0;}
      .w-badge-txt{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.1em;text-transform:uppercase;color:var(--c-muted);}
      .w-h1{font-family:var(--font-display);font-size:clamp(3rem,8vw,7.5rem);font-weight:600;letter-spacing:-.04em;line-height:.95;max-width:16ch;position:relative;z-index:1;}
      .w-h1 em{font-style:italic;font-weight:400;color:var(--c-wealth);}
      .w-hero-split{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-2xl);align-items:end;margin-block-start:var(--sp-xl);position:relative;z-index:1;}
      .w-hero-desc{font-size:var(--s-1);font-weight:300;font-style:italic;color:var(--c-muted);max-width:38ch;line-height:1.5;}

      /* Wallet mockup */
      .wallet-mockup{background:var(--c-surface);border:1px solid rgba(201,160,74,.2);border-radius:8px;padding:var(--sp-xl);position:relative;overflow:hidden;}
      .wallet-mockup::before{content:'';position:absolute;top:-40%;right:-20%;width:200%;height:200%;background:radial-gradient(circle,rgba(201,160,74,.06) 0%,transparent 60%);pointer-events:none;}
      .wallet-header{display:flex;align-items:center;justify-content:space-between;margin-block-end:var(--sp-l);}
      .wallet-label{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.08em;text-transform:uppercase;color:var(--c-muted);}
      .wallet-currency{font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;letter-spacing:.06em;color:var(--c-wealth);padding:2px 8px;border:1px solid rgba(201,160,74,.3);border-radius:2px;}
      .wallet-balance{font-family:var(--font-display);font-size:var(--s-4);font-weight:600;letter-spacing:-.04em;color:var(--c-text);margin-block-end:var(--sp-xs);}
      .wallet-balance-sub{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;color:var(--c-pos);margin-block-end:var(--sp-xl);}
      .wallet-actions{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-s);margin-block-end:var(--sp-l);}
      .wallet-btn{font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;letter-spacing:.07em;text-transform:uppercase;padding:var(--sp-s);text-align:center;border-radius:2px;border:1px solid;cursor:none;}
      .wallet-btn.fund{background:var(--c-wealth);color:var(--c-bg);border-color:var(--c-wealth);}
      .wallet-btn.withdraw{background:transparent;color:var(--c-muted);border-color:var(--c-bd-mid);}
      .wallet-txns{display:flex;flex-direction:column;gap:var(--sp-xs);}
      .wallet-txn{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-xs) 0;border-block-end:1px solid var(--c-border);}
      .wallet-txn:last-child{border-block-end:none;}
      .txn-name{font-size:var(--s-0);font-weight:300;}
      .txn-amt{font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;}
      .txn-amt.pos{color:var(--c-pos);}
      .txn-amt.neg{color:var(--c-muted);}

      /* Campaign card */
      .campaign-card{background:var(--c-surface);border:1px solid var(--c-border);padding:var(--sp-xl);display:flex;flex-direction:column;gap:var(--sp-m);position:relative;overflow:hidden;transition:border-color .3s,background .3s;cursor:none;}
      .campaign-card:hover{border-color:rgba(201,160,74,.3);background:var(--c-raised);}
      .campaign-card::after{content:'';position:absolute;bottom:0;left:0;height:2px;width:0;background:linear-gradient(90deg,var(--c-research),var(--c-wealth));transition:width .5s var(--ease-expo);}
      .campaign-card:hover::after{width:100%;}
      .camp-sector{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.08em;text-transform:uppercase;}
      .camp-name{font-family:var(--font-display);font-size:var(--s-2);font-weight:600;letter-spacing:-.02em;line-height:1.1;}
      .camp-desc{font-size:var(--s-0);font-weight:300;color:var(--c-muted);line-height:1.6;}
      .camp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-s);border-block-start:1px solid var(--c-border);padding-block-start:var(--sp-m);}
      .camp-stat-n{font-family:var(--font-display);font-size:var(--s-2);font-weight:600;letter-spacing:-.03em;color:var(--c-wealth);}
      .camp-stat-l{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.05em;text-transform:uppercase;color:var(--c-muted);}
      .camp-min{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.06em;color:var(--c-muted);border-block-start:1px solid var(--c-border);padding-block-start:var(--sp-m);}

      /* Features */
      .feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--c-border);}
      .feature-card{background:var(--c-bg);padding:var(--sp-xl);display:flex;flex-direction:column;gap:var(--sp-m);position:relative;overflow:hidden;transition:background .35s;cursor:none;}
      .feature-card:hover{background:var(--c-raised);}
      .feature-card::before{content:'';position:absolute;top:0;left:0;width:0;height:2px;background:var(--c-wealth);transition:width .5s var(--ease-expo);}
      .feature-card:hover::before{width:100%;}
      .feat-num{font-family:var(--font-mono);font-size:var(--s-3);font-weight:300;color:var(--c-border);line-height:1;}
      .feat-icon-lg{font-size:var(--s-3);line-height:1;}
      .feat-name{font-family:var(--font-display);font-size:var(--s-2);font-weight:600;letter-spacing:-.02em;}
      .feat-desc{font-size:var(--s-0);font-weight:300;color:var(--c-muted);line-height:1.65;}

      /* Steps */
      .steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-l);position:relative;}
      .steps-grid::before{content:'';position:absolute;top:28px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,var(--c-research),var(--c-wealth));opacity:.3;}
      .step-card{display:flex;flex-direction:column;gap:var(--sp-m);position:relative;}
      .step-num{width:56px;height:56px;border-radius:50%;border:1px solid var(--c-bd-mid);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:var(--s-1);font-weight:300;color:var(--c-wealth);background:var(--c-surface);flex-shrink:0;}
      .step-name{font-family:var(--font-display);font-size:var(--s-1);font-weight:600;letter-spacing:-.02em;}
      .step-desc{font-size:var(--s-0);font-weight:300;color:var(--c-muted);line-height:1.6;}

      /* Referral */
      .referral-block{background:var(--c-surface);border:1px solid rgba(201,160,74,.2);border-radius:4px;padding:var(--sp-2xl);display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-2xl);align-items:center;}
      .ref-eyebrow{font-family:var(--font-mono);font-size:var(--s--1);font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--c-wealth);margin-block-end:var(--sp-m);}
      .ref-h2{font-family:var(--font-display);font-size:var(--s-3);font-weight:600;letter-spacing:-.03em;line-height:1;margin-block-end:var(--sp-m);}
      .ref-desc{font-size:var(--s-0);font-weight:300;color:var(--c-muted);line-height:1.65;margin-block-end:var(--sp-xl);}
      .ref-stats{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-m);}
      .ref-stat-n{font-family:var(--font-display);font-size:var(--s-3);font-weight:700;letter-spacing:-.04em;color:var(--c-wealth);}
      .ref-stat-l{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.06em;text-transform:uppercase;color:var(--c-muted);}
    }

    /* ── RESEARCH PAGES ──────────────────────────────────── */
    @layer research {
      .r-hero{min-height:100svh;display:grid;grid-template-rows:1fr auto;position:relative;overflow:hidden;}
      .r-hero::before{content:'';position:absolute;top:-15%;right:-10%;width:60vmax;height:60vmax;background:radial-gradient(circle,rgba(0,135,81,.06) 0%,transparent 65%);pointer-events:none;}
      .r-naira{position:absolute;right:-.05em;top:50%;transform:translateY(-50%);font-family:var(--font-display);font-size:clamp(16rem,38vw,52rem);font-weight:700;color:transparent;-webkit-text-stroke:1px rgba(0,135,81,.07);line-height:1;pointer-events:none;user-select:none;z-index:0;}
      .r-hero-inner{display:flex;flex-direction:column;justify-content:center;padding:var(--sp-4xl) var(--sp-l) var(--sp-2xl);position:relative;z-index:1;}
      .r-badge{display:inline-flex;align-items:center;gap:var(--sp-s);padding:var(--sp-xs) var(--sp-m);border:1px solid var(--c-bd-mid);border-radius:2px;background:rgba(0,135,81,.04);width:fit-content;margin-block-end:var(--sp-xl);}
      .r-dot{width:6px;height:6px;border-radius:50%;background:var(--c-research);box-shadow:0 0 8px var(--c-research);flex-shrink:0;}
      .r-h1{font-family:var(--font-display);font-size:clamp(3.2rem,8vw,7.5rem);font-weight:600;letter-spacing:-.04em;line-height:.95;max-width:16ch;position:relative;z-index:1;}
      .r-h1 em{font-style:italic;font-weight:400;color:var(--c-wealth);}
      .r-sub-row{display:grid;grid-template-columns:1fr auto;align-items:end;gap:var(--sp-xl);margin-block-start:var(--sp-xl);position:relative;z-index:1;}
      .r-desc{font-size:var(--s-1);font-weight:300;font-style:italic;color:var(--c-muted);max-width:38ch;line-height:1.5;}
      .r-tags{display:flex;flex-direction:column;align-items:flex-end;gap:var(--sp-xs);}
      .r-tag{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;letter-spacing:.08em;text-transform:uppercase;color:var(--c-muted);display:flex;align-items:center;gap:var(--sp-xs);}
      .r-tag::before{content:'';display:inline-block;width:20px;height:1px;background:var(--c-research);}
      .r-chart{position:relative;z-index:1;border-block-start:1px solid var(--c-border);padding:var(--sp-m) var(--sp-l);display:flex;align-items:center;gap:var(--sp-l);}
      .chart-wrap{flex:1;height:64px;}
      .chart-svg{width:100%;height:100%;overflow:visible;}
      .chart-path{fill:none;stroke:var(--c-research);stroke-width:1.5px;stroke-linecap:round;vector-effect:non-scaling-stroke;}
      .chart-fill{fill:url(#chartGrad);opacity:.35;}
      .chart-meta{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;flex-shrink:0;text-align:right;}

      .cats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--c-border);}
      .cat-card{background:var(--c-bg);padding:var(--sp-xl);display:flex;flex-direction:column;gap:var(--sp-l);position:relative;overflow:hidden;transition:background .35s;cursor:none;}
      .cat-card:hover{background:var(--c-raised);}
      .cat-card::before{content:'';position:absolute;bottom:0;left:0;height:1px;width:0;background:var(--c-research);transition:width .5s var(--ease-expo);}
      .cat-card:hover::before{width:100%;}
      .cat-icon{font-size:var(--s-3);line-height:1;}
      .cat-name{font-family:var(--font-display);font-size:var(--s-2);font-weight:600;letter-spacing:-.02em;margin-block-end:var(--sp-xs);}
      .cat-desc{font-size:var(--s-0);font-weight:300;color:var(--c-muted);line-height:1.65;}
      .cat-foot{display:flex;align-items:center;justify-content:space-between;border-block-start:1px solid var(--c-border);padding-block-start:var(--sp-m);margin-block-start:auto;}
      .cat-count{font-family:var(--font-mono);font-size:var(--s--1);font-weight:300;color:var(--c-muted);}
      .cat-arr{color:var(--c-research);transition:transform .3s var(--ease-expo);}
      .cat-card:hover .cat-arr{transform:translateX(6px);}

      .stats-bar{background:var(--c-surface);border-block:1px solid var(--c-border);}
      .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);}
      .plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-l);}
    }

    /* ── UTILITIES ──────────────────────────────────────── */
    @layer utilities {
      .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
      .reveal{opacity:0;transform:translateY(24px);}
      .text-gold{color:var(--c-wealth);}
      .text-green{color:var(--c-research);}
      @media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;}}
    }

    /* ── ANIMATIONS ─────────────────────────────────────── */
    @layer animations {
      @media(prefers-reduced-motion:no-preference){
        @keyframes fadeUp  {from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
        @keyframes ticker  {from{transform:translateX(0);}to{transform:translateX(-50%);}}
        @keyframes dotPulse{0%,100%{box-shadow:0 0 6px currentColor;}50%{box-shadow:0 0 14px currentColor,0 0 28px currentColor;}}
        @keyframes pageFade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

        .w-badge-dot,.r-dot{animation:dotPulse 2.5s ease-in-out infinite;}
        .ticker-track{animation:ticker 28s linear infinite;}
        .is-visible{animation:fadeUp .75s var(--ease-expo) forwards;}
        #app{animation:pageFade .35s var(--ease-expo);}
      }
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media(max-width:1024px){
      .hub-cards{grid-template-columns:1fr;}
      .hub-divider{width:100%;height:1px;}
      .stats-grid{grid-template-columns:repeat(2,1fr);}
      .cats-grid{grid-template-columns:1fr 1fr;}
      .plans-grid{grid-template-columns:1fr;max-width:480px;margin-inline:auto;}
      .feature-grid{grid-template-columns:1fr 1fr;}
      .steps-grid{grid-template-columns:1fr 1fr;}
      .steps-grid::before{display:none;}
      .referral-block{grid-template-columns:1fr;}
      .ftr-top{grid-template-columns:1fr 1fr;}
      .w-hero-split{grid-template-columns:1fr;}
      .r-sub-row{grid-template-columns:1fr;}
    }
    @media(max-width:768px){
      body{cursor:auto;}
      .cursor,.cursor-ring{display:none;}
      .main-nav{display:none;}
      .nav-cta.desktop{display:none;}
      .hamburger{display:flex;}
      .cats-grid{grid-template-columns:1fr;}
      .feature-grid{grid-template-columns:1fr;}
      .steps-grid{grid-template-columns:1fr;}
      .stats-grid{grid-template-columns:1fr 1fr;}
      .report-row{grid-template-columns:1fr auto;}
      .report-row .type-badge,.report-row .report-date{display:none;}
      .ftr-top{grid-template-columns:1fr;}
      .r-naira,.w-naira-bg{opacity:.04;font-size:65vw;}
      .r-tags{align-items:flex-start;}
      .r-tag::before{display:none;}
    }
  </style>
</head>
